name: Tests

on:
  push:
    branches: [ master, main, develop ]
  pull_request:
    branches: [ master, main, develop ]

jobs:
  test:
    name: Test on ${{ matrix.platform }}
    runs-on: macos-14
    
    strategy:
      matrix:
        platform: [iOS, macOS, tvOS, watchOS]
        include:
          - platform: iOS
            destination: 'platform=iOS Simulator,name=iPhone 15,OS=17.2'
          - platform: macOS
            destination: 'platform=macOS'
          - platform: tvOS
            destination: 'platform=tvOS Simulator,name=Apple TV,OS=17.2'
          - platform: watchOS
            destination: 'platform=watchOS Simulator,name=Apple Watch Series 9 (45mm),OS=10.2'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: '15.2'
    
    - name: Cache Swift Package Manager
      uses: actions/cache@v3
      with:
        path: .build
        key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved') }}
        restore-keys: |
          ${{ runner.os }}-spm-
    
    - name: Build
      run: swift build -v
    
    - name: Run Tests
      run: swift test -v --enable-code-coverage
    
    - name: Generate Coverage Report
      if: matrix.platform == 'macOS'
      run: |
        xcrun llvm-cov export -format="lcov" \
          .build/debug/DesignKitPackageTests.xctest/Contents/MacOS/DesignKitPackageTests \
          -instr-profile .build/debug/codecov/default.profdata > coverage.lcov
    
    - name: Upload Coverage to Codecov
      if: matrix.platform == 'macOS'
      uses: codecov/codecov-action@v3
      with:
        files: ./coverage.lcov
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

  lint:
    name: SwiftLint
    runs-on: macos-14
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install SwiftLint
      run: brew install swiftlint
    
    - name: Run SwiftLint
      run: swiftlint lint --strict

  documentation:
    name: Build Documentation
    runs-on: macos-14
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Build DocC
      run: |
        swift package --allow-writing-to-directory ./docs \
          generate-documentation --target DesignKit \
          --output-path ./docs \
          --transform-for-static-hosting \
          --hosting-base-path DesignKit


