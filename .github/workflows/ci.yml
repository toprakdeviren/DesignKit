name: CI

on:
  push:
    branches: [ master, main, develop ]
  pull_request:
    branches: [ master, main, develop ]

jobs:
  build-and-test:
    name: Build and Test (${{ matrix.platform }} - ${{ matrix.xcode }})
    runs-on: ${{ matrix.os }}
    
    strategy:
      fail-fast: false
      matrix:
        include:
          # iOS - Multiple versions & Xcode combinations
          - platform: iOS
            os: macos-14
            xcode: '15.2'
            destination: 'platform=iOS Simulator,name=iPhone 15,OS=17.2'
            swift: '5.9'
          
          - platform: iOS
            os: macos-14
            xcode: '15.4'
            destination: 'platform=iOS Simulator,name=iPhone 15 Pro,OS=17.4'
            swift: '5.10'
          
          - platform: iOS
            os: macos-15
            xcode: '16.0'
            destination: 'platform=iOS Simulator,name=iPhone 16,OS=18.0'
            swift: '6.0'
          
          # iOS 16 support (minimum deployment target)
          - platform: iOS-16
            os: macos-13
            xcode: '15.0'
            destination: 'platform=iOS Simulator,name=iPhone 14,OS=16.4'
            swift: '5.9'
          
          # macOS - Multiple versions
          - platform: macOS
            os: macos-13
            xcode: '15.0'
            destination: 'platform=macOS,arch=x86_64'
            swift: '5.9'
          
          - platform: macOS
            os: macos-14
            xcode: '15.2'
            destination: 'platform=macOS'
            swift: '5.9'
          
          - platform: macOS
            os: macos-15
            xcode: '16.0'
            destination: 'platform=macOS'
            swift: '6.0'
          
          # tvOS
          - platform: tvOS
            os: macos-14
            xcode: '15.2'
            destination: 'platform=tvOS Simulator,name=Apple TV,OS=17.2'
            swift: '5.9'
          
          - platform: tvOS
            os: macos-15
            xcode: '16.0'
            destination: 'platform=tvOS Simulator,name=Apple TV 4K (3rd generation),OS=18.0'
            swift: '6.0'
          
          # watchOS
          - platform: watchOS
            os: macos-14
            xcode: '15.2'
            destination: 'platform=watchOS Simulator,name=Apple Watch Series 9 (45mm),OS=10.2'
            swift: '5.9'
          
          - platform: watchOS
            os: macos-15
            xcode: '16.0'
            destination: 'platform=watchOS Simulator,name=Apple Watch Series 10 (46mm),OS=11.0'
            swift: '6.0'
    
    env:
      DEVELOPER_DIR: /Applications/Xcode_${{ matrix.xcode }}.app/Contents/Developer
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Setup Swift
      uses: swift-actions/setup-swift@v1
      with:
        swift-version: "5.9"
    
    - name: Cache SPM
      uses: actions/cache@v3
      with:
        path: .build
        key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved') }}
        restore-keys: |
          ${{ runner.os }}-spm-
    
    - name: Build
      run: swift build --build-tests
    
    - name: Run Tests
      if: matrix.platform != 'watchOS'
      run: swift test --enable-code-coverage
    
    - name: Generate Coverage Report
      if: matrix.platform == 'iOS'
      run: |
        xcrun llvm-cov export -format="lcov" \
          .build/debug/DesignKitPackageTests.xctest/Contents/MacOS/DesignKitPackageTests \
          -instr-profile .build/debug/codecov/default.profdata > coverage.lcov
    
    - name: Upload Coverage to Codecov
      if: matrix.platform == 'iOS'
      uses: codecov/codecov-action@v3
      with:
        files: coverage.lcov
        flags: unittests
        name: codecov-${{ matrix.platform }}
        fail_ci_if_error: false
  
  lint:
    name: SwiftLint
    runs-on: macos-14
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Cache Mint
      uses: actions/cache@v3
      with:
        path: ~/.mint
        key: ${{ runner.os }}-mint-${{ hashFiles('Mintfile') }}
        restore-keys: |
          ${{ runner.os }}-mint-
    
    - name: Install Mint
      run: |
        brew install mint
    
    - name: Install SwiftLint via Mint
      run: mint bootstrap
    
    - name: Lint
      run: mint run swiftlint lint --strict
  
  format-check:
    name: SwiftFormat Check
    runs-on: macos-14
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Cache Mint
      uses: actions/cache@v3
      with:
        path: ~/.mint
        key: ${{ runner.os }}-mint-${{ hashFiles('Mintfile') }}
        restore-keys: |
          ${{ runner.os }}-mint-
    
    - name: Install Mint
      run: brew install mint
    
    - name: Install SwiftFormat via Mint
      run: mint bootstrap
    
    - name: Check Format
      run: mint run swiftformat --lint .
  
  api-diff:
    name: API Diff Check (Swift API Digester)
    runs-on: macos-14
    if: github.event_name == 'pull_request'
    
    steps:
    - name: Checkout PR
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Setup Swift
      uses: swift-actions/setup-swift@v1
      with:
        swift-version: "5.9"
    
    # Build baseline (base branch)
    - name: Checkout Base Branch
      run: |
        git fetch origin ${{ github.base_ref }}
        git checkout origin/${{ github.base_ref }}
    
    - name: Build Base (Baseline)
      run: |
        swift build --target DesignKit
        mkdir -p .build/baseline
        cp -R .build/debug .build/baseline/
    
    - name: Generate Baseline API Dump
      run: |
        xcrun swift-api-digester -sdk $(xcrun --show-sdk-path --sdk macosx) \
          -dump-sdk \
          -module DesignKit \
          -o .build/baseline-api.json \
          -I .build/baseline/debug \
          -target x86_64-apple-macosx13.0
    
    # Build current (PR branch)
    - name: Checkout PR Branch
      run: |
        git checkout ${{ github.head_ref }}
    
    - name: Build PR Branch
      run: |
        swift build --target DesignKit
    
    - name: Generate Current API Dump
      run: |
        xcrun swift-api-digester -sdk $(xcrun --show-sdk-path --sdk macosx) \
          -dump-sdk \
          -module DesignKit \
          -o .build/current-api.json \
          -I .build/debug \
          -target x86_64-apple-macosx13.0
    
    # Compare APIs
    - name: Compare APIs (Breakage Detection)
      id: api-compare
      continue-on-error: true
      run: |
        xcrun swift-api-digester -sdk $(xcrun --show-sdk-path --sdk macosx) \
          -diagnose-sdk \
          -baseline .build/baseline-api.json \
          -module DesignKit \
          -I .build/debug \
          -target x86_64-apple-macosx13.0 \
          > .build/api-diff.txt 2>&1 || true
        
        # Check if there are breaking changes
        if grep -q "error:" .build/api-diff.txt; then
          echo "has_breaking_changes=true" >> $GITHUB_OUTPUT
          echo "⚠️ BREAKING CHANGES DETECTED!"
          cat .build/api-diff.txt
          exit 1
        elif grep -q "warning:" .build/api-diff.txt; then
          echo "has_warnings=true" >> $GITHUB_OUTPUT
          echo "⚠️ API changes detected (non-breaking)"
          cat .build/api-diff.txt
        else
          echo "✅ No API changes detected"
        fi
    
    - name: Upload API Diff Report
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: api-diff-report
        path: |
          .build/api-diff.txt
          .build/baseline-api.json
          .build/current-api.json
    
    - name: Comment PR (Breaking Changes)
      if: steps.api-compare.outputs.has_breaking_changes == 'true'
      uses: actions/github-script@v6
      with:
        script: |
          const fs = require('fs');
          const diff = fs.readFileSync('.build/api-diff.txt', 'utf8');
          
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: `## ⚠️ Breaking API Changes Detected\n\n` +
                  `This PR introduces breaking changes to the public API.\n\n` +
                  `<details>\n<summary>API Diff Report</summary>\n\n` +
                  `\`\`\`\n${diff}\n\`\`\`\n\n</details>\n\n` +
                  `**Pre-1.0 (0.x.x):** Breaking changes are allowed in MINOR versions.\n` +
                  `**Post-1.0:** Breaking changes require a MAJOR version bump.\n\n` +
                  `Please ensure:\n` +
                  `- [ ] Changes are documented in CHANGELOG.md\n` +
                  `- [ ] Migration guide is provided (if needed)\n` +
                  `- [ ] Deprecation warnings added (if applicable)\n\n` +
                  `See [API_STABILITY.md](../API_STABILITY.md) for more details.`
          });
    
    - name: Comment PR (Warnings)
      if: steps.api-compare.outputs.has_warnings == 'true' && steps.api-compare.outputs.has_breaking_changes != 'true'
      uses: actions/github-script@v6
      with:
        script: |
          const fs = require('fs');
          const diff = fs.readFileSync('.build/api-diff.txt', 'utf8');
          
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: `## ℹ️ API Changes Detected (Non-Breaking)\n\n` +
                  `This PR includes API changes that are not breaking.\n\n` +
                  `<details>\n<summary>API Diff Report</summary>\n\n` +
                  `\`\`\`\n${diff}\n\`\`\`\n\n</details>\n\n` +
                  `These changes look safe, but please review carefully.`
          });
  
  spm-compatibility:
    name: SPM Compatibility
    runs-on: macos-14
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Test SPM Build
      run: swift build
    
    - name: Test SPM Test
      run: swift test
    
    - name: Validate Package
      run: swift package dump-package
  
  documentation:
    name: Documentation
    runs-on: macos-14
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Build Documentation
      run: |
        swift package generate-documentation --target DesignKit
    
    - name: Check Documentation Coverage
      run: |
        echo "Documentation build completed successfully"

