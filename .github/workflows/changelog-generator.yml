name: Changelog Generator

on:
  push:
    branches: [ master, main, develop ]
  pull_request:
    branches: [ master, main ]

permissions:
  contents: write
  pull-requests: write

jobs:
  generate-changelog:
    name: Generate Changelog
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 # Full history for changelog
    
    - name: Generate Changelog
      id: changelog
      run: |
        # Son iki tag arasındaki commit'leri al
        LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
        
        if [ -z "$LATEST_TAG" ]; then
          # İlk release, tüm commit'leri al
          COMMITS=$(git log --pretty=format:"- %s (%h)" --reverse)
        else
          # Son tag'den bu yana
          COMMITS=$(git log ${LATEST_TAG}..HEAD --pretty=format:"- %s (%h)" --reverse)
        fi
        
        # Conventional Commits'e göre kategorize et
        FEATURES=$(echo "$COMMITS" | grep -i "^- feat" || true)
        FIXES=$(echo "$COMMITS" | grep -i "^- fix" || true)
        DOCS=$(echo "$COMMITS" | grep -i "^- docs" || true)
        CHORES=$(echo "$COMMITS" | grep -i "^- chore" || true)
        TESTS=$(echo "$COMMITS" | grep -i "^- test" || true)
        REFACTORS=$(echo "$COMMITS" | grep -i "^- refactor" || true)
        PERF=$(echo "$COMMITS" | grep -i "^- perf" || true)
        
        # Changelog oluştur
        CHANGELOG="## Unreleased\n\n"
        
        if [ ! -z "$FEATURES" ]; then
          CHANGELOG="${CHANGELOG}### Added\n${FEATURES}\n\n"
        fi
        
        if [ ! -z "$FIXES" ]; then
          CHANGELOG="${CHANGELOG}### Fixed\n${FIXES}\n\n"
        fi
        
        if [ ! -z "$DOCS" ]; then
          CHANGELOG="${CHANGELOG}### Documentation\n${DOCS}\n\n"
        fi
        
        if [ ! -z "$REFACTORS" ]; then
          CHANGELOG="${CHANGELOG}### Changed\n${REFACTORS}\n\n"
        fi
        
        if [ ! -z "$PERF" ]; then
          CHANGELOG="${CHANGELOG}### Performance\n${PERF}\n\n"
        fi
        
        if [ ! -z "$TESTS" ]; then
          CHANGELOG="${CHANGELOG}### Tests\n${TESTS}\n\n"
        fi
        
        echo -e "$CHANGELOG" > CHANGELOG_DRAFT.md
        
        # PR için özet
        echo "changelog_summary<<EOF" >> $GITHUB_OUTPUT
        echo -e "$CHANGELOG" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT
    
    - name: Upload Changelog Draft
      uses: actions/upload-artifact@v3
      with:
        name: changelog-draft
        path: CHANGELOG_DRAFT.md
    
    - name: Comment on related PRs
      if: github.event_name == 'push'
      uses: actions/github-script@v6
      with:
        script: |
          const fs = require('fs');
          const changelog = fs.readFileSync('CHANGELOG_DRAFT.md', 'utf8');
          
          // Son merge edilen PR'ları bul
          const { data: pulls } = await github.rest.pulls.list({
            owner: context.repo.owner,
            repo: context.repo.repo,
            state: 'closed',
            sort: 'updated',
            direction: 'desc',
            per_page: 10
          });
          
          const recentlyMergedPRs = pulls.filter(pr => 
            pr.merged_at && 
            new Date(pr.merged_at) > new Date(Date.now() - 86400000) // Son 24 saat
          );
          
          for (const pr of recentlyMergedPRs) {
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              body: `## 📝 Changelog Entry\n\nThis PR will be included in the next release:\n\n${changelog.substring(0, 500)}...`
            });
          }
  
  validate-changelog:
    name: Validate Changelog
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Check CHANGELOG.md Updated
      id: check_changelog
      run: |
        # PR'da CHANGELOG.md'nin değişip değişmediğini kontrol et
        if git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -q "CHANGELOG.md"; then
          echo "changelog_updated=true" >> $GITHUB_OUTPUT
          echo "✅ CHANGELOG.md güncellendi"
        else
          echo "changelog_updated=false" >> $GITHUB_OUTPUT
          echo "⚠️ CHANGELOG.md güncellenmedi"
        fi
    
    - name: Comment if Changelog Missing
      if: steps.check_changelog.outputs.changelog_updated == 'false'
      uses: actions/github-script@v6
      with:
        script: |
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: `## ⚠️ CHANGELOG Güncellenmedi\n\n` +
                  `Bu PR CHANGELOG.md'yi güncellemedi. Lütfen değişikliklerinizi CHANGELOG.md'ye ekleyin:\n\n` +
                  `\`\`\`markdown\n` +
                  `## [Unreleased]\n\n` +
                  `### Added\n` +
                  `- Your feature (#${context.issue.number})\n` +
                  `\`\`\`\n\n` +
                  `Not: Minor değişiklikler (typo, format vb.) için CHANGELOG güncellemesi gerekmez.`
          });
    
    - name: Validate Changelog Format
      if: steps.check_changelog.outputs.changelog_updated == 'true'
      run: |
        # CHANGELOG formatını kontrol et
        if ! grep -q "## \[Unreleased\]" CHANGELOG.md; then
          echo "❌ CHANGELOG.md'de [Unreleased] bölümü bulunamadı"
          exit 1
        fi
        
        if ! grep -qE "### (Added|Fixed|Changed|Deprecated|Removed|Security)" CHANGELOG.md; then
          echo "❌ CHANGELOG.md'de kategori başlıkları bulunamadı"
          exit 1
        fi
        
        echo "✅ CHANGELOG formatı geçerli"

