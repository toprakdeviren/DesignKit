# SwiftLint Configuration for DesignKit

# Paths
included:
  - Sources
  - Tests
  - Examples

excluded:
  - .build
  - DerivedData
  - Package.swift

# Rules
disabled_rules:
  - trailing_whitespace
  - todo
  - line_length # Design systems often have long modifier chains

opt_in_rules:
  - empty_count
  - explicit_init
  - implicit_return
  - closure_spacing
  - redundant_optional_initialization
  - vertical_whitespace_closing_braces
  - vertical_whitespace_opening_braces

# Rule Configuration
file_length:
  warning: 400
  error: 600

type_body_length:
  warning: 300
  error: 400

function_body_length:
  warning: 50
  error: 100

identifier_name:
  min_length: 1 # Allow single-letter variables in closures
  max_length:
    warning: 40
    error: 50
  excluded:
    - id
    - x
    - y
    - px
    - py
    - pt
    - pb
    - pl
    - pr

nesting:
  type_level: 2

cyclomatic_complexity:
  warning: 10
  error: 15

# Custom Rules
custom_rules:
  # Ensure DK prefix for public components
  component_naming:
    name: "Component Naming"
    regex: 'public\s+struct\s+(?!DK)[A-Z]\w+\s*<'
    message: "Public components should be prefixed with DK"
    severity: warning

  # Discourage force unwrapping
  force_unwrap:
    name: "Force Unwrapping"
    regex: '!\s*(?!\s*=)'
    message: "Avoid force unwrapping - use optional binding instead"
    severity: warning

# Reporters
reporter: "xcode"

